hydra:
  run:
    dir: ${cache_path}/${task}/${model}/${dataset}/${now:%Y-%m-%d}/${now:%H-%M-%S}

defaults:
  - model: bloomz-560m
  - estimators: default_estimators
  - stat_calculators: default_calculators
  - base_processing_triviaqa
  - _self_

cache_path: ./workdir/output
save_path: '${hydra:run.dir}'
instruct: false
task: qa

dataset: ['rediska0123/hotpotqa_lmpoly', 'base']
text_column: input
label_column: output
train_split: train
eval_split: test
max_new_tokens: 20
load_from_disk: false
multiref: true
trust_remote_code: false
size: 2000
generation_params:
  generate_until:
    - "\n"

